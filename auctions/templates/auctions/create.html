{% extends "auctions/layout.html" %}

{% block body %}
    <h1>Create New Listing</h1>
    <br>
    <form action="{% url 'create' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <input autofocus class="form-control" type="text" name="title" placeholder="Title">
        </div>
        <div class="form-group">
            <textarea class="form-control" id="description" placeholder="Description" name="description" rows="5" cols="40"></textarea>
        </div>
        <div class="form-group">
            <input autofocus class="form-control" type="number" name="starting_bid" placeholder="Starting bid">
        </div>
        <div class="form-group">
            <input autofocus class="form-control" type="url" name="image_url" placeholder="URL for the image (Optional)">
        </div>
        <div class="form-group">
            <select name="category" class="form-control">
                <option value="">Select Category (Optional)</option>
                <option value="Fashion">Fashion</option>
                <option value="Toys">Toys</option>
                <option value="Electronics">Electronics</option>
                <option value="Home">Home</option>
            </select><br>
        </div>
        <input class="btn btn-primary" type="submit" value="Create">
    </form>
{% endblock %}
